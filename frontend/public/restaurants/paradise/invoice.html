<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise — Generate Invoice</title>
    <link rel="stylesheet" href="invoice.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="invoice-page">
    <!-- Login Screen -->
    <div class="login-overlay" id="invoiceLoginOverlay">
        <div class="login-card">
            <div class="login-icon">🔒</div>
            <h2 class="login-title">Invoice Access</h2>
            <p class="login-subtitle">Enter credentials to continue</p>
            <div class="login-form">
                <input type="text" id="invoiceUsername" class="login-input" placeholder="Username" autocomplete="off">
                <input type="password" id="invoicePassword" class="login-input" placeholder="Password" autocomplete="off">
                
                <!-- CAPTCHA UI -->
                <div class="captcha-container" style="display: flex; gap: 10px; align-items: center; margin-bottom: 1rem; background: #f3f4f6; padding: 10px; border-radius: 8px;">
                    <span id="captchaPrompt" style="font-weight: 600; font-size: 0.95rem; color: #374151; white-space: nowrap;">Loading...</span>
                    <input type="text" id="captchaInput" class="login-input" style="margin-bottom: 0;" placeholder="Answer" autocomplete="off">
                </div>

                <p class="login-error" id="invoiceLoginError" style="display:none;">Wrong username or password.</p>
                <button class="login-btn" id="invoiceLoginBtn">Unlock</button>
            </div>
        </div>
    </div>

    <!-- Invoice Content (hidden until authenticated) -->
    <div id="invoiceContent" style="display:none;">
    <header class="invoice-header">
        <h1 class="header-title">Generate Invoice</h1>
    </header>

    <main class="invoice-main">
        <!-- Search & Filter Area -->
        <section class="invoice-filters">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="itemSearch" placeholder="Search items or categories...">
            </div>
            
            <div class="category-pills" id="categoryPills">
                <button class="category-pill active" data-category="all">All</button>
                <!-- Categories populated by invoice.js -->
            </div>
        </section>

        <!-- Items Table Container -->
        <section class="items-section">
            <div class="items-list-container">
                <div class="items-list-header">
                    <span class="col-name">Item Name</span>
                    <span class="col-price">Price</span>
                    <span class="col-action">Action</span>
                </div>
                <div id="invoiceItemsList" class="items-list">
                    <!-- Items populated by invoice.js -->
                    <div class="loading-state">Loading menu data...</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Action Bar -->
    <footer class="invoice-actions-footer">
        <div class="cart-summary" id="invoiceCartSummary" style="display: none;">
            <div class="cart-status">
                <span id="totalItemCount">0 items selected</span>
                <span id="totalAmount">Subtotal: ₹0</span>
            </div>
            <button class="next-btn" id="goToInvoiceCart">
                Generate Invoice
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
    </footer>

    <!-- Invoice Modal -->
    <div id="invoiceModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Invoice Preview</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </header>
            <div class="modal-body" id="invoicePreviewContent">
                <!-- Preview content injected by JS -->
            </div>
            <div class="modal-footer">
                <button class="share-whatsapp-btn" id="sendWhatsApp">
                    Share on WhatsApp
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    </div><!-- end invoiceContent -->

    <!-- Shared Menu Data and Logic -->
    <script src="menu-data.js"></script>
    <script src="invoice.js"></script>
</body>

</html>
